name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag: {description: "Existing release tag", required: true}

permissions: {contents: write, actions: read}
concurrency: {group: publish-channels, cancel-in-progress: false}
env:
  BLENDER_VERSION: "5.1.2"
  BLENDER_SERIES: "5.1"
  PYTHON_VERSION: "3.11"

jobs:
  candidate:
    uses: ./.github/workflows/build-release-candidate.yml
    with:
      ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      tag: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

  publish:
    needs: candidate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
      - uses: actions/setup-python@v5
        with: {python-version: "${{ env.PYTHON_VERSION }}", cache: pip}
      - run: pip install -r requirements-build.txt
      - uses: actions/download-artifact@v4
        with: {name: cloth-next-release-candidate, path: dist}
      - name: Require matching unpublished preflight
        env: {GH_TOKEN: "${{ github.token }}"}
        run: python tools/check_release_preflight.py --commit "$GITHUB_SHA" --version "${{ needs.candidate.outputs.version }}"
      - name: Enforce immutable tag and release
        env: {GH_TOKEN: "${{ github.token }}"}
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          test "$(git rev-list -n 1 "$TAG")" = "$GITHUB_SHA"
          ! gh release view "$TAG" >/dev/null 2>&1
      - run: python tools/release_metadata.py --zip "dist/${{ needs.candidate.outputs.zip-name }}" --tag "${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}" --commit "$GITHUB_SHA" --output-dir dist
      - run: python tools/validate_release_policy.py --phase post-build --tag "${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}" --zip "dist/${{ needs.candidate.outputs.zip-name }}"
      - env: {GH_TOKEN: "${{ github.token }}"}
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          FLAG=""; [ "${{ needs.candidate.outputs.channel }}" = beta ] && FLAG=--prerelease
          gh release create "$TAG" --draft $FLAG --title "Cloth NeXt ${{ needs.candidate.outputs.version }}" --notes-file RELEASE_NOTES.md
          gh release upload "$TAG" "dist/${{ needs.candidate.outputs.zip-name }}" dist/release-manifest.json dist/SHA256SUMS.txt
      - shell: bash
        run: |
          curl -fsSL "https://download.blender.org/release/Blender${BLENDER_SERIES}/blender-${BLENDER_VERSION}-linux-x64.tar.xz" -o blender.tar.xz
          mkdir -p "$RUNNER_TEMP/blender"; tar -xf blender.tar.xz -C "$RUNNER_TEMP/blender" --strip-components=1
          echo "CLOTH_NEXT_BLENDER=$RUNNER_TEMP/blender/blender" >> "$GITHUB_ENV"
      - run: |
          git fetch origin gh-pages || true
          mkdir -p site
          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then git worktree add site-publish origin/gh-pages; cp -r site-publish/. site/ || true; rm -rf site/.git; fi
      - name: Build every cumulative channel repository
        shell: bash
        run: |
          case "${{ needs.candidate.outputs.channel }}" in
            stable) TARGETS="stable beta dev" ;;
            beta) TARGETS="beta dev" ;;
            *) echo "unsupported tagged release channel" >&2; exit 1 ;;
          esac
          for TARGET in $TARGETS; do
            python tools/build_extension_repository.py --zip "dist/${{ needs.candidate.outputs.zip-name }}" --sha256 "${{ needs.candidate.outputs.zip-sha256 }}" --channel "$TARGET" --site-dir site --blender "$CLOTH_NEXT_BLENDER"
          done
      - run: python tools/validate_release_policy.py --phase pre-publish --tag "${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}" --zip "dist/${{ needs.candidate.outputs.zip-name }}" --release-manifest dist/release-manifest.json --sha256sums dist/SHA256SUMS.txt --site-dir site
      - run: |
          CHANNEL="${{ needs.candidate.outputs.channel }}"
          if [ "$CHANNEL" = stable ]; then TARGETS="stable beta dev"; else TARGETS="beta dev"; fi
          if [ ! -d site-publish ]; then git worktree add --detach site-publish; git -C site-publish checkout --orphan gh-pages; git -C site-publish rm -rf --quiet . || true; fi
          for TARGET in $TARGETS; do
            rm -rf "site-publish/$TARGET"
            cp -r "site/$TARGET" "site-publish/$TARGET"
          done
          touch site-publish/.nojekyll
          git -C site-publish add -A
          git -C site-publish -c user.name=github-actions -c user.email=41898282+github-actions[bot]@users.noreply.github.com commit -m "Publish $CHANNEL release to $TARGETS for ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          git -C site-publish push origin HEAD:gh-pages
      - env: {GH_TOKEN: "${{ github.token }}"}
        run: gh release edit "${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}" --draft=false
