# Cloth NeXt CI — runs on every push and pull request.
# Never publishes anything; releases go through release.yml only.
name: ci

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

env:
  BLENDER_VERSION: "5.0.0"
  BLENDER_SERIES: "5.0"
  PYTHON_VERSION: "3.11"

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install test dependencies
        run: pip install -r requirements-build.txt

      # The real PPF integration test is never collected here; it stays
      # available for explicitly configured local/Windows runs via
      # `pytest -m integration`.
      - name: Unit tests (integration tests excluded)
        run: pytest -m "not integration and not built_artifact"

      - name: Validate extension source structure
        run: python tools/validate_extension.py cloth_next --phase source

  blender-smoke:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4

      - name: Cache Blender download
        id: blender-cache
        uses: actions/cache@v4
        with:
          path: blender.tar.xz
          key: blender-${{ env.BLENDER_VERSION }}-linux-x64

      - name: Download Blender
        if: steps.blender-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          curl -fsSL "https://download.blender.org/release/Blender${BLENDER_SERIES}/blender-${BLENDER_VERSION}-linux-x64.tar.xz" -o blender.tar.xz

      - name: Extract Blender
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/blender"
          tar -xf blender.tar.xz -C "$RUNNER_TEMP/blender" --strip-components=1
          echo "BLENDER=$RUNNER_TEMP/blender/blender" >> "$GITHUB_ENV"

      - name: Build extension with the official Blender tooling
        run: |
          set -euo pipefail
          mkdir -p dist
          "$BLENDER" --command extension build \
            --source-dir=cloth_next --output-filepath=dist/cloth_next-smoke.zip

      - name: Install the extension into Blender (bl_ext namespace)
        run: |
          set -euo pipefail
          "$BLENDER" --command extension install-file \
            --repo user_default --enable dist/cloth_next-smoke.zip

      - name: Real registration smoke test
        run: |
          set -euo pipefail
          "$BLENDER" --background \
            --python-exit-code 1 --python tools/blender_smoke_test.py
