# Cloth NeXt bundled fabric material presets (read-only).
#
# The six calibrated fabric presets (Silk, Flag, Cotton, Wool, Denim,
# Leather) are numeric material values taken verbatim from the PPF Contact
# Solver project's bundled preset data. Only the data values were copied;
# no upstream Python or UI code is included, Cloth NeXt is an independent
# project, and the PPF Contact Solver itself remains separately installed
# software that Cloth NeXt never redistributes.
#
# Upstream convention preserved here: shell young modulus values are
# ALREADY density-normalized PPF wire values (young_mod_density_normalized
# = true in the source file; NOT textbook pascals), shell density is an
# area density in kg/m² shipped at a uniform 1.0, and strain limits are
# percentages that the encoder converts to the wire fraction.
#
# DEFAULT_CLOTH is not an upstream calibrated textile; it mirrors the
# pinned upstream shell default values.

[provenance]
source_project = "st-tech/ppf-contact-solver"
source_commit = "7193f158e3843597070f66cb29af19efd9bdcff7"
source_path = "blender_addon/presets/materials.toml"
source_license = "Apache-2.0"
notes = """Preset values are derived from the Apache-2.0 licensed data file
above (see docs/THIRD_PARTY_NOTICES.md for the full notice). Cloth NeXt is
an independent project; the external PPF Contact Solver is separate
software installed by the user and is never bundled with Cloth NeXt."""

[[preset]]
id = "DEFAULT_CLOTH"
label = "Default Cloth"
description = "Neutral starting cloth using the PPF shell defaults"
upstream_calibrated = false
model = "FABRIC"
surface_weight = 1.0
stretch_resistance = 1000.0
sideways_response = 0.35
bend_resistance = 10.0
surface_grip = 0.5
stretch_limit_enabled = false
maximum_stretch_percent = 5.0
shape_damping = 0.0
fold_damping = 0.0
collision_gap = 0.001
surface_offset = 0.0

